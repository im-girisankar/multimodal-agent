# CI pipeline — parked (reference template for GitHub Actions)
#
# To activate: move this file to .github/workflows/ci.yml
# and push to a GitHub repository.

name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Format check (ruff)
        run: ruff format --check src tests

      - name: Run tests
        run: pytest

  # Sanity check: importing the package must not require any optional extras.
  import-smoke:
    name: Import smoke (no extras)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e .
      - run: python -c "import multimodal_agent; print(multimodal_agent.__version__)"
